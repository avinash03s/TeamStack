<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamStack - Forgot Password</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:15px;
            overflow-x:hidden;
        }
        .decoration{
            position:absolute;
            top:-180px;
            right:-180px;
            width:700px;
            height:700px;
            background:linear-gradient(135deg,#ff6b35,#ff8c42);
            border-radius:50%;
            z-index:0;
        }
        .card{
            background:white;
            max-width:420px;
            width:100%;
            padding:35px 30px;
            border-radius:18px;
            box-shadow:0 15px 40px rgba(0,0,0,0.1);
            position:relative;
            z-index:2;
        }
        .logo{
            text-align:center;
            margin-bottom:18px;
        }
        .logo h1{
            font-size:34px;
            color:#ff6b35;
            margin-bottom:4px;
        }
        .logo p{
            font-size:11px;
            letter-spacing:1.5px;
            color:#999;
            text-transform:uppercase;
        }
        h2{
            text-align:center;
            font-size:22px;
            color:#5a6c7d;
            margin-bottom:18px;
        }
        .form-group{
            margin-bottom:14px;
        }
        .form-group label{
            font-size:13px;
            color:#5a6c7d;
            margin-bottom:5px;
            display:block;
        }
        .form-group input{
            width:100%;
            padding:10px 12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
            background:#fafafa;
        }
        .form-group input:focus{
            outline:none;
            border-color:#ff6b35;
            background:#fff;
        }
        button{
            width:100%;
            padding:11px;
            margin-top:10px;
            background:linear-gradient(135deg,#ff6b35,#ff8c42);
            border:none;
            border-radius:25px;
            font-size:15px;
            font-weight:600;
            color:white;
            cursor:pointer;
        }
        button:hover{
            opacity:0.9;
        }
        .error-msg{
            color:red;
            text-align:center;
            margin-bottom:15px;
            font-size:13px;
        }
        .back{
            text-align:center;
            margin-top:12px;
        }
        .back a{
            font-size:13px;
            color:#5a6c7d;
            text-decoration:none;
        }
        .back a:hover{
            color:#ff6b35;
        }
        .version{
            text-align:center;
            margin-top:8px;
            font-size:11px;
            color:#aaa;
        }
        @media(max-width:480px){
            .card{
                padding:25px 20px;
            }

            .logo h1{
                font-size:30px;
            }

            h2{
                font-size:20px;
            }
        }
    </style>
</head>
<body>
<div class="decoration"></div>
<div class="card">
<!--    <div class="logo">-->
<!--        <h1>TeamStack</h1>-->
<!--        <p>Collaboration Made Simple</p>-->
<!--    </div>-->
    <h2>Forgot Password</h2>
    <p th:if="${error}" th:text="${error}" class="error-msg"></p>
    <form th:action="@{/forgotPasswordForm}" method="POST">
        <div class="form-group">
            <label>Email</label>
            <label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </label>
        </div>
        <div class="form-group">
            <label>Old Password</label>
            <label>
                <input type="password" name="password" placeholder="Enter your old password" required>
            </label>
        </div>
        <button type="submit">Next</button>
    </form>
    <div class="back">
        <a th:href="@{/login}">Back to Login</a>
    </div>
    <div class="version">TeamStack v1.0</div>
</div>
</body>
</html>
