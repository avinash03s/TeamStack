<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamStack - Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:15px;
            overflow-x:hidden;
        }

        /* Decorative Shape */
        .decoration{
            position:absolute;
            top:-180px;
            right:-180px;
            width:700px;
            height:700px;
            background:linear-gradient(135deg,#ff6b35,#ff8c42);
            border-radius:50%;
            z-index:0;
        }

        /* Login Card */
        .login-container{
            background:white;
            max-width:420px;
            width:100%;
            padding:35px 30px;
            border-radius:18px;
            box-shadow:0 15px 40px rgba(0,0,0,0.1);
            position:relative;
            z-index:2;
        }

        /* Logo */
        .logo{
            text-align:center;
            margin-bottom:18px;
        }

        .logo h1{
            font-size:34px;
            color:#ff6b35;
            margin-bottom:4px;
        }

        .logo p{
            font-size:11px;
            letter-spacing:1.5px;
            color:#999;
            text-transform:uppercase;
        }

        h3{
            text-align:center;
            font-size:22px;
            color:#5a6c7d;
            margin-bottom:18px;
        }

        /* Form */
        .form-group{
            margin-bottom:14px;
        }

        .form-group label{
            font-size:13px;
            color:#5a6c7d;
            margin-bottom:5px;
            display:block;
        }

        .form-group input{
            width:100%;
            padding:10px 12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
            background:#fafafa;
        }

        .form-group input:focus{
            outline:none;
            border-color:#ff6b35;
            background:#fff;
        }

        /* Button */
        .btn-login{
            width:100%;
            padding:11px;
            margin-top:10px;
            background:linear-gradient(135deg,#ff6b35,#ff8c42);
            border:none;
            border-radius:25px;
            font-size:15px;
            font-weight:600;
            color:white;
            cursor:pointer;
        }

        .btn-login:hover{
            opacity:0.9;
        }

        /* Links */
        .forgot-password{
            text-align:center;
            margin-top:12px;
        }

        .forgot-password a{
            font-size:13px;
            color:#ff6b35;
            text-decoration:none;
        }

        .back-link{
            text-align:center;
            margin-top:12px;
        }

        .back-link a{
            font-size:13px;
            color:#5a6c7d;
            text-decoration:none;
        }

        .back-link a:hover{
            color:#ff6b35;
        }

        .version{
            text-align:center;
            margin-top:8px;
            font-size:11px;
            color:#aaa;
        }
        @media(max-width:480px){
            .login-container{
                padding:25px 20px;
            }

            .logo h1{
                font-size:30px;
            }

            h3{
                font-size:20px;
            }
        }
    </style>
</head>
<body>
<div class="decoration"></div>
<div class="login-container">

    <div class="logo">
        <h1>TeamStack</h1>
        <p>Collaboration Made Simple</p>
    </div>

    <h3>Login</h3>
    <p id="successMsg"
       th:if="${success}"
       th:text="${success}"
       style="color:white;background:#28a745;padding:8px;border-radius:5px;text-align:center;">
    </p>
    <p th:if="${error}" th:text="${error}" style="color:red; text-align:center;"></p>
    <form action="loginForm" method="POST">
        <div class="form-group">
            <label>Email</label>
            <label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </label>
        </div>
        <div class="form-group">
            <label>Password</label>
            <label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </label>
        </div>
        <button class="btn-login">Login</button>
    </form>

    <div class="forgot-password">
        <a th:href="@{/forgot-password}">Forgot your password?</a>
    </div>

    <div style="text-align:center; margin-top:15px;">
        <span style="font-size:13px;">Don't have an account?</span>
        <a th:href="@{/register}" style="color:#ff6b35; font-size:13px;">
            Register here
        </a>
    </div>
    <div class="version">TeamStack v1.0</div>
</div>
<script>
    setTimeout(function(){
        let msg = document.getElementById("successMsg");
        if(msg){
            msg.style.display = "none";
        }
    },3000);
</script>
</body>
</html>
