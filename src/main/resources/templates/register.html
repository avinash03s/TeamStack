<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamStack - Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:15px;
            overflow-x:hidden;
        }
        .decoration{
            position:absolute;
            top:-180px;
            right:-180px;
            width:700px;
            height:700px;
            background:linear-gradient(135deg,#ff6b35,#ff8c42);
            border-radius:50%;
            z-index:0;
        }
        .register-container{
            background:#fff;
            width:100%;
            max-width:460px;
            padding:35px 30px;
            border-radius:18px;
            box-shadow:0 15px 40px rgba(0,0,0,0.1);
            position:relative;
            z-index:2;
        }
        .logo{
            text-align:center;
            margin-bottom:20px;
        }

        .logo h1{
            font-size:34px;
            color:#ff6b35;
            margin-bottom:4px;
        }

        .logo p{
            font-size:11px;
            letter-spacing:1.5px;
            color:#999;
            text-transform:uppercase;
        }

        h3{
            text-align:center;
            font-size:22px;
            margin-bottom:18px;
            color:#5a6c7d;
        }
        .form-group{
            margin-bottom:14px;
        }
        .form-group label{
            font-size:13px;
            color:#5a6c7d;
            margin-bottom:5px;
            display:block;
        }

        .form-group input{
            width:100%;
            padding:10px 12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
            background:#fafafa;
        }

        .form-group input:focus{
            outline:none;
            border-color:#ff6b35;
            background:#fff;
        }
        .btn-register{
            width:100%;
            padding:11px;
            margin-top:8px;
            background:linear-gradient(135deg,#ff6b35,#ff8c42);
            border:none;
            border-radius:25px;
            font-size:15px;
            font-weight:600;
            color:white;
            cursor:pointer;
        }

        .btn-register:hover{
            opacity:0.9;
        }

        .back-link{
            text-align:center;
            margin-top:14px;
        }

        .back-link a{
            text-decoration:none;
            font-size:13px;
            color:#5a6c7d;
        }

        .back-link a:hover{
            color:#ff6b35;
        }

        .version{
            text-align:center;
            margin-top:10px;
            font-size:11px;
            color:#aaa;
        }
        @media(max-width:480px){
            .register-container{
                padding:25px 20px;
            }

            .logo h1{
                font-size:30px;
            }

            h3{
                font-size:20px;
            }
        }
    </style>
</head>
<body>
<div class="decoration"></div>
<div class="register-container">
    <div class="logo">
        <h1>TeamStack</h1>
        <p>Collaboration Made Simple</p>
    </div>
    <h3>Register</h3>

    <!-- SUCCESS MESSAGE -->
    <div th:if="${message}" class="alert alert-success"
         style="margin:16px; padding:12px; border-radius:8px; background:#d1fae5; color:#065f46;">
        <span th:text="${message}"></span>
    </div>

    <!-- ERROR MESSAGE -->
    <div th:if="${errorMessage}" class="alert alert-error"
         style="margin:16px; padding:14px; border-radius:10px; background:#fee2e2; border-left:4px solid #ef4444; color:#991b1b; display:flex; gap:12px; align-items:center;">
        <span th:text="${errorMessage}"></span>
    </div>

    <form action="regForm" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </label>
        </div>
        <div class="form-group">
            <label>Email</label>
            <label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </label>
        </div>

        <div class="form-group">
            <label>Password</label>
            <label>
                <input type="password" name="password" placeholder="Create a password" required>
            </label>
        </div>

        <div class="form-group">
            <label>City</label>
            <label>
                <input type="text" name="city" placeholder="Enter your city" required>
            </label>
        </div>
        <button class="btn-register">Register</button>
    </form>
    <div class="back-link">
        <a href="home">Back to Home</a>
    </div>
    <div class="version">TeamStack v1.0</div>
</div>
</body>
</html>
