<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <title>Settings - TeamStack</title>
  <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:15px;
    }
    .decoration{
        position:absolute;
        top:-180px;
        right:-180px;
        width:700px;
        height:700px;
        background:linear-gradient(135deg,#ff6b35,#ff8c42);
        border-radius:50%;
        z-index:0;
    }
    .container {
    animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
    }
    .container{
        background:white;
        width:100%;
        max-width:420px;
        padding:30px 25px;
        border-radius:18px;
        box-shadow:0 15px 40px rgba(0,0,0,0.1);
        position:relative;
        z-index:2;
    }
    .logo{
        text-align:center;
        margin-bottom:15px;
    }
    .logo h1{
        color:#ff6b35;
        font-size:30px;
    }
    h3{
        text-align:center;
        margin-bottom:20px;
        color:#5a6c7d;
        font-size:20px;
    }
    .section{
        margin-bottom:20px;
    }
    .section h4{
        font-size:12px;
        color:#888;
        margin-bottom:8px;
        text-transform:uppercase;
        letter-spacing:1px;
    }
    .btn{
        display:block;
        width:100%;
        padding:12px;
        margin-bottom:10px;
        border-radius:25px;
        border:none;
        font-weight:600;
        text-align:center;
        text-decoration:none;
        cursor:pointer;
        font-size:14px;
    }
    .btn-orange{
        background:linear-gradient(135deg,#ff6b35,#ff8c42);
        color:white;
    }
    .btn-orange:hover{
        opacity:0.9;
    }
    .btn-danger{
        background:#ef4444;
        color:white;
    }
    .btn-danger:hover{
        opacity:0.9;
    }
    .back{
        text-align:center;
        margin-top:10px;
    }
    .back a{
        text-decoration:none;
        color:#555;
        font-size:13px;
    }
    .back a:hover{
        color:#ff6b35;
    }
    @media (max-width: 480px) {
        .container{
            padding:25px 18px;
            border-radius:14px;
        }
        .logo h1{
            font-size:26px;
        }
        h3{
            font-size:18px;
        }
        .btn{
            padding:11px;
            font-size:13px;
        }
    }
    @media (max-width: 360px) {
        .logo h1{
            font-size:24px;
        }
        h3{
            font-size:16px;
        }
        .btn{
            font-size:12px;
            padding:10px;
        }
    }
  </style>
</head>
<body>
<div class="decoration"></div>
<div class="container">
  <div class="logo">
    <h1>TeamStack</h1>
  </div>
  <h3>Settings</h3>
  <div class="section">
    <h4>Account</h4>
    <a href="/adminProfile" class="btn btn-orange">My Profile</a>
  </div>
  <div class="section">
    <h4>Security</h4>
    <a href="/forgot-password" class="btn btn-orange">Change Password</a>
  </div>
  <div class="section">
    <h4 style="color:red;">Danger Zone</h4>
    <a href="/delete-account" class="btn btn-danger">Delete Account</a>
  </div>
  <div class="back">
    <a href="/home">⬅ Back to Dashboard</a>
  </div>
</div>
</body>
</html>
