<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account - TeamStack</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:15px;
        }
        .decoration{
            position:absolute;
            top:-180px;
            right:-180px;
            width:700px;
            height:700px;
            background:linear-gradient(135deg,#ff6b35,#ff8c42);
            border-radius:50%;
            z-index:0;
        }
        .container{
            background:white;
            max-width:420px;
            width:100%;
            padding:35px 30px;
            border-radius:18px;
            box-shadow:0 15px 40px rgba(0,0,0,0.1);
            position:relative;
            z-index:2;
        }
        .logo{
            text-align:center;
            margin-bottom:15px;
        }
        .logo h1{
            font-size:32px;
            color:#ff6b35;
        }
        h3{
            text-align:center;
            font-size:22px;
            color:#5a6c7d;
            margin-bottom:10px;
        }
        .warning{
            text-align:center;
            font-size:13px;
            color:#999;
            margin-bottom:18px;
        }
        .warning strong{
            color:red;
        }
        .form-group{
            margin-bottom:14px;
        }
        .form-group input{
            width:100%;
            padding:10px 12px;
            border:1px solid #ddd;
            border-radius:6px;
            font-size:14px;
            background:#fafafa;
        }
        .form-group input:focus{
            outline:none;
            border-color:#ff6b35;
            background:#fff;
        }
        .btn-delete{
            width:100%;
            padding:11px;
            margin-top:10px;
            background:linear-gradient(135deg,#ff6b35,#ff8c42);
            border:none;
            border-radius:25px;
            font-size:15px;
            font-weight:600;
            color:white;
            cursor:pointer;
        }
        .btn-delete:hover{
            opacity:0.9;
        }
        .checkbox{
            font-size:12px;
            margin-top:10px;
        }
        .back-link{
            text-align:center;
            margin-top:12px;
        }
        .back-link a{
            font-size:13px;
            color:#5a6c7d;
            text-decoration:none;
        }
        .back-link a:hover{
            color:#ff6b35;
        }
        .error{
            color:red;
            text-align:center;
            margin-bottom:10px;
        }
    </style>
</head>
<body>
<div class="decoration"></div>
<div class="container">
    <div class="logo">
        <h1>TeamStack</h1>
    </div>
    <h3>Delete Account</h3>
    <p class="warning">
        This action is <strong>permanent</strong>.<br>
        All your employees and data will be deleted.
    </p>
    <p th:if="${error}" th:text="${error}" class="error"></p>
    <form action="/deleteAccount" method="post">
        <div class="form-group">
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <div class="checkbox">
            <input type="checkbox" required> I understand this action cannot be undone
        </div>
        <button class="btn-delete">
            Delete My Account
        </button>
    </form>
    <div class="back-link">
        <a href="/settings">⬅ Back to Settings</a>
    </div>
</div>

</body>
</html>
